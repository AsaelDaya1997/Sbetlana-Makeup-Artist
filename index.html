<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBETLANA ARTIST</title>

<style>
body {
    background: linear-gradient(to bottom, #FFF3E0, #f5e6d3);
    text-align: center;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
}

h1 {
    color: #000000;
    font-size: 40px;
    margin-bottom: 5px;
}

h2 {
    color: #bfa37c;
    letter-spacing: 5px;
    font-size: 18px;
    margin-top: 40px;
}

p {
    color: #000000;
    font-size: 18px;
    max-width: 400px;
    margin: 20px auto;
}

/* Imagen principal */
body img:first-of-type {
    width: 350px;
    border-radius: 15px;
    box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
}

/* Galería */
.galeria {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    margin-top: 20px;
}

.galeria img {
    width: 160px;
    height: 220px;
    object-fit: cover;
    border-radius: 18px;
    transition: all 0.4s ease;
}

.galeria:hover img {
    transform: scale(0.95);
    opacity: 0.7;
}

.galeria img:hover {
    transform: scale(1.2);
    opacity: 1;
    z-index: 2;
    position: relative;
    box-shadow: 0px 15px 30px rgba(0,0,0,0.3);
}

/* 📱 CELULAR */
@media (max-width: 600px) {

    h1 { font-size: 28px; }

    h2 {
        font-size: 14px;
        letter-spacing: 3px;
    }

    body img:first-of-type {
        width: 90%;
    }

    .galeria img {
        width: 45%;
        height: 180px;
    }

    .galeria:hover img,
    .galeria img:hover {
        transform: none;
        opacity: 1;
        box-shadow: none;
    }
}

/* BOTÓN WHATSAPP */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background-color: #25D366;
    color: white;
    padding: 14px 18px;
    border-radius: 50px;
    font-weight: bold;
    text-decoration: none;
    box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
    z-index: 1000;
}

.whatsapp:hover {
    transform: scale(1.1);
}
</style>

</head>
<body>
