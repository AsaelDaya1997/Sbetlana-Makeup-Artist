<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<!-- FUENTE ELEGANTE -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

<style>

/* RESET */
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* 🔥 HERO (VIDEO PORTADA) */
.hero {
    position: relative;
    height: 100vh;
    overflow: hidden;
}

.hero video {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    top: 0;
    left: 0;
    z-index: -2;
}

/* capa oscura */
.hero::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
    top: 0;
    left: 0;
    z-index: -1;
}

/* contenido encima */
.hero-content {
    position: relative;
    color: white;
    text-align: center;
    top: 50%;
    transform: translateY(-50%);
}

/* marca */
.hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    letter-spacing: 8px;
    text-transform: uppercase;
    margin: 0;
}

.hero h2 {
    font-size: 14px;
    letter-spacing: 6px;
    color: #bfa37c;
}

/* botón hero */
.hero a {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 25px;
    background-color: #bfa37c;
    color: black;
    text-decoration: none;
    border-radius: 30px;
    font-weight: bold;
}

/* SECCIONES */
.seccion {
    background: linear-gradient(to bottom, #FFF3E0, #f5e6d3);
    padding: 40px 20px;
    text-align: center;
}

/* títulos */
.seccion h2 {
    font-family: 'Playfair Display', serif;
    letter-spacing: 4px;
    color: #000;
}

/* texto */
p {
    color: #000;
    font-size: 18px;
    max-width: 400px;
    margin: 20px auto;
}

/* imagen principal */
.principal {
    width: 350px;
    border-radius: 15px;
    box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
}

/* GALERÍA */
.galeria {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    margin-top: 20px;
}

.galeria img {
    width: 160px;
    height: 220px;
    object-fit: cover;
    border-radius: 18px;
    transition: all 0.4s ease;
}

.galeria:hover img {
    transform: scale(0.95);
    opacity: 0.7;
}

.galeria img:hover {
    transform: scale(1.2);
    opacity: 1;
    z-index: 2;
    position: relative;
    box-shadow: 0px 15px 30px rgba(0,0,0,0.3);
}

/* 📱 CELULAR */
@media (max-width: 600px) {

    .hero video {
        display: none;
    }

    .hero {
        background: #000;
    }

    .hero h1 {
        font-size: 30px;
    }

    .principal {
        width: 90%;
    }

    .galeria img {
        width: 45%;
        height: 180px;
    }

    .galeria:hover img,
    .galeria img:hover {
        transform: none;
        opacity: 1;
        box-shadow: none;
    }
}

/* BOTÓN WHATSAPP (SIEMPRE VISIBLE) */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background-color: #25D366;
    color: white;
    padding: 14px 18px;
    border-radius: 50px;
    font-weight: bold;
    text-decoration: none;
    box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
    z-index: 1000;
}

.whatsapp:hover {
    transform: scale(1.1);
}

</style>
</head>

<body>

<!-- 🎥 PORTADA CON VIDEO -->

    <div class="hero-content">

            Agenda tu cita
        </a>
    </div>
</section>

<!-- 👇 CONTENIDO -->
